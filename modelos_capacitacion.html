    <style>
        body { font-family: 'Inter', sans-serif; }

                    </div>
                </div>

                <div id="estatusBadge" class="inline-block px-4 py-1 rounded-full text-sm font-bold tracking-wide"></div>
            </div>

            <button onclick="resetSearch()" class="mt-6 text-gray-400 hover:text-gray-600 text-sm underline">
                Nueva consulta
            </button>
        </div>

        <!-- Mensaje de Error -->
        <div id="errorMsg" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm flex items-center justify-center gap-2">

        function buscarCalificacion() {
            const matricula = document.getElementById('matriculaInput').value.trim();
            const resultSection = document.getElementById('resultSection');
            const searchSection = document.getElementById('searchSection');
            const errorMsg = document.getElementById('errorMsg');
            
            // Buscar alumno (normalizando matrícula para ignorar .0 al final)
            const alumno = db.find(a => {
                const matDB = String(a.matricula).replace('.0', '').trim();
                const matInput = String(matricula).replace('.0', '').trim();
                return matDB === matInput;
            });

            if (alumno) {
                // Mostrar resultados
                document.getElementById('alumnoNombre').textContent = alumno.nombre;
                document.getElementById('calificacionValor').textContent = alumno.calificacion;
                
                const circle = document.getElementById('calificacionCircle');
                const badge = document.getElementById('estatusBadge');
                
                // Configurar colores según estatus
                if (alumno.estatus === 'APROBADO') {
                    circle.className = "w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold text-white shadow-lg mx-auto mt-2 bg-green-500";
                    badge.className = "inline-block px-4 py-1 rounded-full text-sm font-bold tracking-wide bg-green-100 text-green-700";
                    badge.textContent = "APROBADO";
                } else if (alumno.estatus === 'REPROBADO') {
                    circle.className = "w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold text-white shadow-lg mx-auto mt-2 bg-red-500";
                    badge.className = "inline-block px-4 py-1 rounded-full text-sm font-bold tracking-wide bg-red-100 text-red-700";
                    badge.textContent = "REPROBADO";
                } else {
                    circle.className = "w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold text-white shadow-lg mx-auto mt-2 bg-yellow-500";
                    badge.className = "inline-block px-4 py-1 rounded-full text-sm font-bold tracking-wide bg-yellow-100 text-yellow-700";
                    badge.textContent = "PENDIENTE";
                }

                searchSection.classList.add('hidden');
                resultSection.classList.remove('hidden');
                errorMsg.classList.add('hidden');
            } else {
                // Mostrar error
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        }

        function resetSearch() {
            document.getElementById('matriculaInput').value = '';
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('searchSection').classList.remove('hidden');
        }
    </script>
